x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '3'

services:
  speckle-ingress:
    build:
      context: .
      dockerfile: utils/docker-compose-ingress/Dockerfile
    platform: linux/amd64
    image: speckle/speckle-docker-compose-ingress:local
    restart: always
    logging: *default-logging
    ports:
      - '0.0.0.0:80:8080'
      - '0.0.0.0:443:8443'
    environment:
      FILE_SIZE_LIMIT_MB: '1000'
      NGINX_ENVSUBST_OUTPUT_DIR: '/etc/nginx'
      DOMAIN: '${DOMAIN}'
      DOMAIN_ALIAS: '${DOMAIN_ALIAS:-}'
      S3_BUCKET: '${S3_BUCKET}'
    volumes:
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - speckle-server
      - speckle-frontend-2

  speckle-frontend-2:
    build:
      context: .
      dockerfile: packages/frontend-2/Dockerfile
      args:
        SPECKLE_SERVER_VERSION: ${SPECKLE_SERVER_VERSION:-custom}
    platform: linux/amd64
    image: speckle/speckle-frontend-2:local
    restart: always
    logging: *default-logging
    environment:
      NUXT_PUBLIC_SERVER_NAME: 'local'
      # This is the URL of the server as accessed by users.
      NUXT_PUBLIC_API_ORIGIN: 'https://${DOMAIN}'
      # This is the URL of the server as accessed by users.
      NUXT_PUBLIC_BASE_URL: 'https://${DOMAIN}'
      # This is the URL of the server as accessed via this docker compose network.
      NUXT_PUBLIC_BACKEND_API_ORIGIN: 'http://speckle-server:3000'
      NUXT_PUBLIC_LOG_LEVEL: 'warn'
      NUXT_REDIS_URL: 'redis://redis'
      LOG_LEVEL: 'info'
      LOG_PRETTY: 'true'

      NUXT_PUBLIC_FF_LARGE_FILE_IMPORTS_ENABLED: 'true'
      NUXT_PUBLIC_FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'
    depends_on:
      - speckle-server
      # - redis

  speckle-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      args:
        SPECKLE_SERVER_VERSION: ${SPECKLE_SERVER_VERSION:-custom}
    platform: linux/amd64
    image: speckle/speckle-server:local
    restart: always
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - "try { require('node:http').request({headers: {'Content-Type': 'application/json'}, port:3000, hostname:'127.0.0.1', path:'/readiness', method: 'GET', timeout: 2000 }, (res) => { body = ''; res.on('data', (chunk) => {body += chunk;}); res.on('end', () => {process.exit(res.statusCode != 200 || body.toLowerCase().includes('error') ? 1 : 0);}); }).end(); } catch { process.exit(1); }"
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 90s
    environment:
      # This is the URL of the server as accessed by users.
      CANONICAL_URL: 'https://${DOMAIN}'
      # This is the URL of the server as accessed by other Speckle services within this docker compose network, such as preview-service.
      # This will be the same value as NUXT_PUBLIC_BACKEND_API_ORIGIN as defined in the frontend-2 service.
      PRIVATE_OBJECTS_SERVER_URL: 'http://speckle-server:3000'

      SESSION_SECRET: '${SESSION_SECRET}'

      # This is the authentication strategy to use. Local (i.e. username & password) is the default strategy.
      STRATEGY_LOCAL: 'true'

      # Azure AD Authentication - Microsoft Entra ID
      STRATEGY_AZURE_AD: '${STRATEGY_AZURE_AD:-false}'
      AZURE_AD_ORG_NAME: '${AZURE_AD_ORG_NAME:-Microsoft}'
      AZURE_AD_IDENTITY_METADATA: '${AZURE_AD_IDENTITY_METADATA:-}'
      AZURE_AD_CLIENT_ID: '${AZURE_AD_CLIENT_ID:-}'
      AZURE_AD_ISSUER: '${AZURE_AD_ISSUER:-}'
      AZURE_AD_CLIENT_SECRET: '${AZURE_AD_CLIENT_SECRET:-}'
      AZURE_AD_DEFAULT_COMPANY: '${AZURE_AD_DEFAULT_COMPANY:-}'

      LOG_LEVEL: 'info'
      LOG_PRETTY: 'true'

      POSTGRES_URL: 'postgres'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB}'

      REDIS_URL: 'redis://redis'
      PREVIEW_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      PREVIEW_SERVICE_REDIS_URL: 'redis://redis'
      FILEIMPORT_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      FILEIMPORT_SERVICE_REDIS_URL: 'redis://redis'

      S3_ENDPOINT: 'http://minio:9000'
      S3_PUBLIC_ENDPOINT: 'https://${DOMAIN}'
      S3_ACCESS_KEY: '${S3_ACCESS_KEY}'
      S3_SECRET_KEY: '${S3_SECRET_KEY}'
      S3_BUCKET: '${S3_BUCKET}'
      S3_CREATE_BUCKET: 'true'
      S3_REGION: '' # optional, defaults to 'us-east-1'
      FILE_SIZE_LIMIT_MB: 1000
      MAX_OBJECT_SIZE_MB: 200
      MAX_REQUEST_BODY_SIZE_MB: 200
      # Email configuration (see .env.example for setup)
      EMAIL: '${EMAIL_ENABLED:-false}'
      EMAIL_HOST: '${EMAIL_HOST:-}'
      EMAIL_PORT: '${EMAIL_PORT:-587}'
      EMAIL_FROM: '${EMAIL_FROM:-}'
      EMAIL_USERNAME: '${EMAIL_USERNAME:-}'
      EMAIL_PASSWORD: '${EMAIL_PASSWORD:-}'
      EMAIL_SECURE: '${EMAIL_SECURE:-false}'
      EMAIL_REQUIRE_TLS: '${EMAIL_REQUIRE_TLS:-false}'

      FRONTEND_ORIGIN: 'https://${DOMAIN}'
      ONBOARDING_STREAM_URL: 'https://latest.speckle.systems/projects/843d07eb10'

      FILEIMPORT_QUEUE_POSTGRES_URL: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}'
      FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'
      FF_USERS_INVITE_SCOPE_IS_PUBLIC: '${FF_USERS_INVITE_SCOPE_IS_PUBLIC:-false}'
      FF_AUTO_COLLABORATOR_ENABLED: '${FF_AUTO_COLLABORATOR_ENABLED:-false}'

      POSTGRES_MAX_CONNECTIONS_SERVER: '${POSTGRES_MAX_CONNECTIONS_SERVER:-8}'

    depends_on:
      []
      # - minio
      # - redis
      # - postgres

  preview-service:
    build:
      context: .
      dockerfile: packages/preview-service/Dockerfile
    platform: linux/amd64
    image: speckle/speckle-preview-service:local
    restart: always
    logging: *default-logging
    mem_limit: '3000m'
    memswap_limit: '3000m'
    environment:
      HOST: '127.0.0.1' # The preview service does not need to be exposed outside the container.
      PORT: '3001'
      LOG_LEVEL: 'info'
      LOG_PRETTY: 'true'
      REDIS_URL: 'redis://redis'
    depends_on:
      []
      # - redis

  webhook-service:
    build:
      context: .
      dockerfile: packages/webhook-service/Dockerfile
    platform: linux/amd64
    image: speckle/speckle-webhook-service:local
    restart: always
    logging: *default-logging
    environment:
      LOG_LEVEL: 'info'
      LOG_PRETTY: 'true'
      PG_CONNECTION_STRING: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}'
    depends_on:
      - speckle-server
      # - postgres

  ifc-import-server:
    build:
      context: .
      dockerfile: packages/ifc-import-service/Dockerfile
    platform: linux/amd64
    image: speckle/ifc-import-service:local
    restart: always
    logging: *default-logging
    environment:
      LOG_LEVEL: 'info'
      LOG_PRETTY: 'true'
      FILEIMPORT_QUEUE_POSTGRES_URL: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}'
    depends_on:
      - speckle-server
      # - postgres

  certbot:
    image: certbot/certbot:latest
    logging: *default-logging
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    # Note: After certificate renewal, restart nginx to load new cert:
    # docker compose -f docker-compose-speckle.yml exec speckle-ingress nginx -s reload

volumes:
  certbot-certs:
  certbot-webroot:
