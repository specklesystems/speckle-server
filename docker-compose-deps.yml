x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '3'

services:
  # Actual Speckle Server dependencies

  postgres:
    image: 'postgres:16.4-alpine3.20@sha256:d898b0b78a2627cb4ee63464a14efc9d296884f1b28c841b0ab7d7c42f1fffdf'
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres-data:/var/lib/postgresql/data/
      - ./setup/db/10-docker_postgres_init.sql:/docker-entrypoint-initdb.d/10-docker_postgres_init.sql
      - ./setup/db/11-docker_postgres_keycloak_init.sql:/docker-entrypoint-initdb.d/11-docker_postgres_keycloak_init.sql
    ports:
      - '127.0.0.1:5432:5432'
    command: postgres -c max_prepared_transactions=150

  postgres-region1:
    image: 'postgres:16.4-alpine3.20@sha256:d898b0b78a2627cb4ee63464a14efc9d296884f1b28c841b0ab7d7c42f1fffdf'
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres-region1-data:/var/lib/postgresql/data/
      - ./setup/db/10-docker_postgres_init.sql:/docker-entrypoint-initdb.d/10-docker_postgres_init.sql
      - ./setup/db/11-docker_postgres_keycloak_init.sql:/docker-entrypoint-initdb.d/11-docker_postgres_keycloak_init.sql
    ports:
      - '127.0.0.1:5401:5432'
    command: postgres -c max_prepared_transactions=150

  postgres-region2:
    image: 'postgres:16.4-alpine3.20@sha256:d898b0b78a2627cb4ee63464a14efc9d296884f1b28c841b0ab7d7c42f1fffdf'
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres-region2-data:/var/lib/postgresql/data/
      - ./setup/db/10-docker_postgres_init.sql:/docker-entrypoint-initdb.d/10-docker_postgres_init.sql
      - ./setup/db/11-docker_postgres_keycloak_init.sql:/docker-entrypoint-initdb.d/11-docker_postgres_keycloak_init.sql
    ports:
      - '127.0.0.1:5402:5432'
    command: postgres -c max_prepared_transactions=150

  redis:
    image: 'valkey/valkey:8.1-alpine'
    restart: always
    logging: *default-logging
    volumes:
      - redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'

  minio:
    image: 'minio/minio'
    command: server /data --console-address ":9001"
    restart: always
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: '${S3_ACCESS_KEY}'
      MINIO_ROOT_PASSWORD: '${S3_SECRET_KEY}'
    volumes:
      - minio-data:/data
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'

  minio-region1:
    image: 'minio/minio'
    command: server /data --console-address ":9001"
    restart: always
    logging: *default-logging
    volumes:
      - minio-region1-data:/data
    ports:
      - '127.0.0.1:9020:9000'
      - '127.0.0.1:9021:9001'

  minio-region2:
    image: 'minio/minio'
    command: server /data --console-address ":9001"
    restart: always
    logging: *default-logging
    volumes:
      - minio-region2-data:/data
    ports:
      - '127.0.0.1:9040:9000'
      - '127.0.0.1:9041:9001'

  # Local OIDC provider for testing
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    logging: *default-logging
    depends_on:
      - postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: '${POSTGRES_USER}'
      KC_DB_PASSWORD: '${POSTGRES_PASSWORD}'

      KC_HOSTNAME: 127.0.0.1
      KC_HOSTNAME_PORT: 9000
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false

      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - 8443:8443
      - 9010:9000
      - 8090:8080
    command: start-dev --import-realm
    volumes:
      - ./setup/keycloak:/opt/keycloak/data/import
    # user: root
    # command: export --dir /opt/keycloak/backup --realm speckle
    # volumes:
    #   - ./keycloak-backup:/opt/keycloak/backup

  # Local email server for email troubleshooting
  maildev:
    restart: always
    image: maildev/maildev
    logging: *default-logging
    ports:
      - '127.0.0.1:1080:1080'
      - '127.0.0.1:1025:1025'

  # Useful for debugging / exploring local databases

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - '127.0.0.1:16543:80'
    depends_on:
      - postgres

  redis_insight:
    image: redislabs/redisinsight:latest
    restart: always
    logging: *default-logging
    volumes:
      - redis_insight-data:/db
    ports:
      - '127.0.0.1:8001:8001'
    depends_on:
      - redis

  # Monitoring

  prometheus:
    image: prom/prometheus:latest
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./setup/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '127.0.0.1:9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'

  grafana:
    image: grafana/grafana:latest
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      GF_SECURITY_ADMIN_USER: '${GRAFANA_ADMIN_USER}'
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD}'
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./setup/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./setup/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '127.0.0.1:3100:3000'
    depends_on:
      - prometheus

# Storage persistency

volumes:
  postgres-data:
  postgres-region1-data:
  postgres-region2-data:
  redis-data:
  pgadmin-data:
  redis_insight-data:
  minio-data:
  minio-region1-data:
  minio-region2-data:
  prometheus-data:
  grafana-data:
