on:
  workflow_call:
    inputs:
      GITHUB_REGISTRY_URL:
        required: true
        type: string
      GITHUB_ORG:
        required: true
        type: string
      NPM_REGISTRY_URL:
        required: true
        type: string
      NPM_PUBLISH_ACCESS:
        required: true
        type: string
      IMAGE_VERSION_TAG:
        required: true
        type: string
      NPM_REGISTRY_OIDC_CONNECT:
        default: false
        type: boolean
    secrets:
      NPM_TOKEN:
        required: false

permissions: {} # set default permissions to none, and only allow what's needed in each job

jobs:
  publish:
    name: Publish to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      GITHUB_REGISTRY_URL: ${{ inputs.GITHUB_REGISTRY_URL }}
      GITHUB_ORG: ${{ inputs.GITHUB_ORG }}
      NPM_REGISTRY_URL: ${{ inputs.NPM_REGISTRY_URL }}
      NPM_PUBLISH_ACCESS: ${{ inputs.NPM_PUBLISH_ACCESS }}
      NPM_REGISTRY_OIDC_CONNECT: ${{ inputs.NPM_REGISTRY_OIDC_CONNECT }}
      IMAGE_VERSION_TAG: ${{ inputs.IMAGE_VERSION_TAG }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write # Required for publishing to npmjs.com registry
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: useblacksmith/setup-node@v5
        with:
          node-version: 22
          cache: yarn
      - name: Install hardened (no HARD flag)
        run: PUPPETEER_SKIP_DOWNLOAD=true PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn --immutable
      - name: Auth to npm (OIDC mode)
        if: ${{ inputs.NPM_REGISTRY_OIDC_CONNECT }}
        run: |
          cat <<EOF >> .yarnrc.yml
          npmRegistryServer: "${NPM_REGISTRY_URL%/}"
          npmPublishAccess: "${NPM_PUBLISH_ACCESS}"
          npmRegistries:
            "${NPM_REGISTRY_URL%/}":
              npmAlwaysAuth: true
          EOF

      - name: Auth to npm (token mode)
        if: ${{ !inputs.NPM_REGISTRY_OIDC_CONNECT }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then echo "NPM_TOKEN is empty"; exit 1; fi

          cat <<EOF >> .yarnrc.yml
          npmRegistryServer: "${NPM_REGISTRY_URL%/}"
          npmPublishAccess: "${NPM_PUBLISH_ACCESS}"
          npmRegistries:
            "${NPM_REGISTRY_URL%/}":
              npmAuthToken: "${NPM_TOKEN}"
              npmAlwaysAuth: true
          EOF
      - name: Login test (token mode)
        if: ${{ !inputs.NPM_REGISTRY_OIDC_CONNECT }}
        run: |
          echo "---- Output contents of .yarnrc.yml ----"
          sed 's/npmAuthToken:.*/npmAuthToken: ***REDACTED***/' .yarnrc.yml
          yarn npm whoami --publish

      - name: OIDC info & npm upgrade
        if: ${{ inputs.NPM_REGISTRY_OIDC_CONNECT }}
        # npm >=11.5.1 is required for OIDC trusted publishing; yarn berry does not implement the OIDC token exchange itself.
        # Pinned to npm 11.16.0 by tarball SHA-1; verify via https://registry.npmjs.org/npm/11.16.0 (dist.shasum field).
        env:
          NPM_PINNED_VERSION: 11.16.0
          NPM_PINNED_SHA1: 954286fbc25d74f3c91f402ca8b1e66c8038e861
        run: |
          set -euo pipefail
          echo "OIDC trusted publishing enabled; skipping whoami pre-check"
          echo "Installing npm"
          curl -fsSL -o "npm-${NPM_PINNED_VERSION}.tgz" \
            "https://registry.npmjs.org/npm/-/npm-${NPM_PINNED_VERSION}.tgz"
          echo "${NPM_PINNED_SHA1}  npm-${NPM_PINNED_VERSION}.tgz" | sha1sum -c -
          npm install -g "./npm-${NPM_PINNED_VERSION}.tgz"
          rm -f "npm-${NPM_PINNED_VERSION}.tgz"
          npm --version
      - name: Amend package name & git repository to match
        # required as per https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-npm-registry#publishing-a-package-using-a-local-npmrc-file
        run: |
          if [ "${NPM_REGISTRY_URL}" != "https://registry.npmjs.org/" ]; then
            yarn workspaces foreach -tvW --no-private exec "jq '.name |= sub(\"@speckle\"; \"${GITHUB_ORG}\"), .repository.url = \"${GITHUB_REGISTRY_URL}\"' package.json > tmp.json && mv tmp.json package.json"
          fi
      - name: Build public packages
        run: yarn workspaces foreach -ptvW --no-private run build
      - name: Bump all versions
        run: yarn workspaces foreach -tvW version ${IMAGE_VERSION_TAG}
      - name: publish to npm (token mode)
        if: ${{ !inputs.NPM_REGISTRY_OIDC_CONNECT }}
        run: 'yarn workspaces foreach -pvW --no-private npm publish --access ${NPM_PUBLISH_ACCESS}'
      - name: publish to npm (OIDC mode)
        if: ${{ inputs.NPM_REGISTRY_OIDC_CONNECT }}
        # Use npm CLI directly so its trusted-publishing OIDC token exchange runs; yarn berry doesn't implement it.
        run: 'yarn workspaces foreach -vW --no-private exec "npm publish --access ${NPM_PUBLISH_ACCESS}"'
