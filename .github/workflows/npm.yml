name: Publish npm packages (OIDC trusted publishing)
on:
  workflow_call:
    inputs:
      NPM_REGISTRY_URL:
        required: false
        type: string
        default: 'https://registry.npmjs.org/'
      NPM_PUBLISH_ACCESS:
        required: true
        type: string
      IMAGE_VERSION_TAG:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-npm-oidc-${{ github.ref }}
  cancel-in-progress: false

permissions: {} # purposefully empty by default at workflow level, explicitly overridden for specific jobs below

jobs:
  publish:
    name: Publish to npm (OIDC)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write # yarn exchanges the GitHub Actions OIDC token for a short-lived npm publish token
    env:
      NPM_REGISTRY_URL: ${{ inputs.NPM_REGISTRY_URL }}
      NPM_PUBLISH_ACCESS: ${{ inputs.NPM_PUBLISH_ACCESS }}
      IMAGE_VERSION_TAG: ${{ inputs.IMAGE_VERSION_TAG }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: yarn
      - name: Install hardened (no HARD flag)
        run: PUPPETEER_SKIP_DOWNLOAD=true PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn --immutable
      - name: Configure publish registry
        # Publishing is done with yarn itself: yarn >=4.10 implements the npm trusted
        # publishing (OIDC) token exchange natively, so no auth token and no separate
        # npm CLI are needed. Publishing through yarn keeps the regular `yarn pack`
        # lifecycle: prepack builds run and `workspace:` ranges are resolved to real
        # versions at pack time.
        # No whoami pre-check: with trusted publishing there is no token until the
        # exchange happens during publish itself.
        run: |
          cat <<EOF >> .yarnrc.yml
          npmRegistryServer: "${NPM_REGISTRY_URL%/}"
          npmPublishAccess: "${NPM_PUBLISH_ACCESS}"
          npmRegistries:
            "${NPM_REGISTRY_URL%/}":
              npmAlwaysAuth: true
          EOF
      - name: Ensure packages are published to correct registry
        # not strictly necessary given the yarnrc configuration changes above, but adds an extra layer of safety to prevent accidentally publishing to the wrong registry
        run: |
          yarn workspaces foreach -tvW --no-private exec "jq '.publishConfig.registry = env.NPM_REGISTRY_URL' package.json > tmp.json && mv tmp.json package.json"
      - name: Build public packages
        run: yarn workspaces foreach -ptvW --no-private run build
      - name: Bump all versions
        run: yarn workspaces foreach -tvW --no-private version ${IMAGE_VERSION_TAG}
      - name: Publish to npm
        run: 'yarn workspaces foreach -pvW --no-private npm publish --access ${NPM_PUBLISH_ACCESS}'
